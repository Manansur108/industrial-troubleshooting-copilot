version: '3.9'
services:
  backend:
    build: ../app/backend
    working_dir: /app
    ports:
      - "8000:8000"
    volumes:
      - ../app/backend:/app
      - ../data:/app/data
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build: ../app/frontend
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ../app/frontend:/app
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
